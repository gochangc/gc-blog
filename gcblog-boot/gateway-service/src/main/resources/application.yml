server:
  port: 8080

spring:
  application:
    name: gateway-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yml
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 认证服务路由
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # 用户服务路由
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        # 博客服务路由（StripPrefix=2 去掉 /api/blog 前缀，匹配 Controller 的 /articles、/admin/articles 等路径）
        - id: gcblog-blog
          uri: lb://gcblog-blog
          predicates:
            - Path=/api/blog/**
          filters:
            - StripPrefix=2

        # 导航服务路由（StripPrefix=2 去掉 /api/navigation 前缀，匹配 Controller 的 /nav-links、/nav-categories 等路径）
        - id: gcblog-navigation
          uri: lb://gcblog-navigation
          predicates:
            - Path=/api/navigation/**
          filters:
            - StripPrefix=2
