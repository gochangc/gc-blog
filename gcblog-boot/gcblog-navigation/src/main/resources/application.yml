server:
  port: 8082

spring:
  application:
    name: gcblog-navigation
  datasource:
    url: jdbc:mysql://localhost:3306/gcblog_navigation?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yml

mybatis-flex:
  global-config:
    print-banner: false
  configuration:
    map-underscore-to-camel-case: true
